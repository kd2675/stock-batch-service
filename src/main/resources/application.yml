spring:
  application:
    name: stock-batch-service
  profiles:
    active: local-direct
    group:
      local: local
      local-direct:
        - local
      test: test
      dev: dev
      prod: prod
  devtools:
    livereload:
      enabled: false
    restart:
      enabled: false
  cloud:
    discovery:
      enabled: true
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic
  data:
    redis:
      host: localhost
      port: 6379
  batch:
    job:
      enabled: false
  lifecycle:
    timeout-per-shutdown-phase: ${STOCK_BATCH_SHUTDOWN_TIMEOUT:130s}
  task:
    scheduling:
      shutdown:
        await-termination: ${STOCK_BATCH_SCHEDULING_AWAIT_TERMINATION:true}
        await-termination-period: ${STOCK_BATCH_SCHEDULING_AWAIT_TERMINATION_PERIOD:120s}

server:
  shutdown: ${STOCK_BATCH_SERVER_SHUTDOWN:graceful}

stock:
  simulation-clock:
    base-date: ${STOCK_SIMULATION_BASE_DATE:}
    real-seconds-per-day: ${STOCK_SIMULATION_REAL_SECONDS_PER_DAY:7200}
    stale-after-seconds: ${STOCK_SIMULATION_STALE_AFTER_SECONDS:30}
    heartbeat-fixed-delay-ms: ${STOCK_SIMULATION_HEARTBEAT_FIXED_DELAY_MS:5000}
  market-session:
    open-time: ${STOCK_MARKET_SESSION_OPEN_TIME:06:00}
    close-time: ${STOCK_MARKET_SESSION_CLOSE_TIME:18:00}
  batch:
    schema-readiness:
      enabled: ${STOCK_BATCH_SCHEMA_READINESS_ENABLED:true}
    shutdown:
      await-running-jobs-seconds: ${STOCK_BATCH_SHUTDOWN_AWAIT_RUNNING_JOBS_SECONDS:120}
    internal:
      token: ${STOCK_BATCH_INTERNAL_TOKEN:}
      allow-empty-token: false
    job-lock:
      ttl-seconds: ${STOCK_BATCH_JOB_LOCK_TTL_SECONDS:180}
      heartbeat-interval-seconds: ${STOCK_BATCH_JOB_LOCK_HEARTBEAT_INTERVAL_SECONDS:30}
    scheduler-pools:
      shutdown-await-seconds: ${STOCK_BATCH_SCHEDULER_POOL_SHUTDOWN_AWAIT_SECONDS:120}
      execution:
        pool-size: ${STOCK_BATCH_EXECUTION_SCHEDULER_POOL_SIZE:2}
      auto-market:
        pool-size: ${STOCK_BATCH_AUTO_MARKET_SCHEDULER_POOL_SIZE:1}
      maintenance:
        pool-size: ${STOCK_BATCH_MAINTENANCE_SCHEDULER_POOL_SIZE:1}
      post-close:
        pool-size: ${STOCK_BATCH_POST_CLOSE_SCHEDULER_POOL_SIZE:1}
      simulation-clock:
        pool-size: ${STOCK_BATCH_SIMULATION_CLOCK_SCHEDULER_POOL_SIZE:1}
    signal:
      initial-delay-ms: ${STOCK_BATCH_SIGNAL_INITIAL_DELAY_MS:3000}
      fixed-delay-ms: ${STOCK_BATCH_SIGNAL_FIXED_DELAY_MS:5000}
      chunk-limit: ${STOCK_BATCH_SIGNAL_CHUNK_LIMIT:20}
      lease-seconds: ${STOCK_BATCH_SIGNAL_LEASE_SECONDS:180}
      heartbeat-interval-seconds: ${STOCK_BATCH_SIGNAL_HEARTBEAT_INTERVAL_SECONDS:30}
      retry-base-seconds: ${STOCK_BATCH_SIGNAL_RETRY_BASE_SECONDS:2}
      retry-max-seconds: ${STOCK_BATCH_SIGNAL_RETRY_MAX_SECONDS:300}
      dead-letter-initial-delay-ms: ${STOCK_BATCH_SIGNAL_DEAD_LETTER_INITIAL_DELAY_MS:30000}
      dead-letter-fixed-delay-ms: ${STOCK_BATCH_SIGNAL_DEAD_LETTER_FIXED_DELAY_MS:60000}
    jdbc:
      query-timeout-seconds: ${STOCK_BATCH_JDBC_QUERY_TIMEOUT_SECONDS:30}
    repository:
      schema:
        initialize: ${STOCK_BATCH_SCHEMA_INITIALIZE:false}
        location: classpath:db/schema/batch-metadata-mysql.sql
      datasource:
        url: jdbc:mysql://kimd0.iptime.org:23306/STOCK_BATCH_METADATA?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true
        username: root
        password: 1234
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: stock-batch-metadata-pool
          maximum-pool-size: 12
          minimum-idle: 1
          connection-timeout: 30000
          validation-timeout: 5000
          idle-timeout: 240000
          max-lifetime: 300000
          keepalive-time: 30000
    metadata-retention:
      enabled: ${STOCK_BATCH_METADATA_RETENTION_ENABLED:false}
      retention-real-days: ${STOCK_BATCH_METADATA_RETENTION_REAL_DAYS:30}
      instance-limit: ${STOCK_BATCH_METADATA_RETENTION_INSTANCE_LIMIT:25}
      max-executions-per-instance: ${STOCK_BATCH_METADATA_RETENTION_MAX_EXECUTIONS_PER_INSTANCE:20}
      max-steps-per-instance: ${STOCK_BATCH_METADATA_RETENTION_MAX_STEPS_PER_INSTANCE:200}
      purge-enabled: ${STOCK_BATCH_METADATA_RETENTION_PURGE_ENABLED:false}
      purge-job-names: ${STOCK_BATCH_METADATA_RETENTION_PURGE_JOB_NAMES:}
    market-data:
      enabled: ${STOCK_BATCH_MARKET_DATA_ENABLED:true}
      provider: ${STOCK_BATCH_MARKET_DATA_PROVIDER:mock}
      price-cache-ttl-seconds: ${STOCK_PRICE_CACHE_TTL_SECONDS:60}
      kis:
        base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
        app-key: ${KIS_APP_KEY:}
        app-secret: ${KIS_APP_SECRET:}
        market-div-code: ${KIS_MARKET_DIV_CODE:J}
        connect-timeout-ms: ${KIS_CONNECT_TIMEOUT_MS:5000}
        request-timeout-ms: ${KIS_REQUEST_TIMEOUT_MS:10000}
      initial-delay-ms: 30000
      fixed-delay-ms: 60000
    execution:
      scan-limit: ${STOCK_BATCH_EXECUTION_SCAN_LIMIT:300}
      buy-candidate-scan-limit: ${STOCK_BATCH_EXECUTION_BUY_CANDIDATE_SCAN_LIMIT:20}
      symbol-chunk-limit: ${STOCK_BATCH_EXECUTION_SYMBOL_CHUNK_LIMIT:5}
      symbol-chunk-max-duration-ms: ${STOCK_BATCH_EXECUTION_SYMBOL_CHUNK_MAX_DURATION_MS:500}
      ready-symbol-fallback-scan-limit: ${STOCK_BATCH_EXECUTION_READY_SYMBOL_FALLBACK_SCAN_LIMIT:8}
      deadlock-retry-max-attempts: ${STOCK_BATCH_EXECUTION_DEADLOCK_RETRY_MAX_ATTEMPTS:3}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_EXECUTION_DEADLOCK_RETRY_BACKOFF_MS:50}
      slow-symbol-log-threshold-ms: ${STOCK_BATCH_EXECUTION_SLOW_SYMBOL_LOG_THRESHOLD_MS:1000}
      symbol-lock:
        type: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_TYPE:redis}
        key-prefix: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_KEY_PREFIX:stock:orderbook:lock:}
        ttl-seconds: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_TTL_SECONDS:120}
      ready-symbol-queue:
        type: ${STOCK_BATCH_EXECUTION_READY_SYMBOL_QUEUE_TYPE:redis}
        set-key: ${STOCK_BATCH_EXECUTION_READY_SYMBOL_QUEUE_SET_KEY:stock:orderbook:execution:ready-symbol-set}
        queue-key: ${STOCK_BATCH_EXECUTION_READY_SYMBOL_QUEUE_QUEUE_KEY:stock:orderbook:execution:ready-symbol-queue}
    order-book-execution:
      enabled: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_INITIAL_DELAY_MS:36000}
      fixed-delay-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_FIXED_DELAY_MS:30000}
      worker:
        enabled: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_WORKER_ENABLED:true}
        count: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_WORKER_COUNT:2}
        idle-delay-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_WORKER_IDLE_DELAY_MS:100}
        match-yield-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_WORKER_MATCH_YIELD_MS:5}
        gate-refresh-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_WORKER_GATE_REFRESH_MS:1000}
    execution-account-summary:
      enabled: ${STOCK_BATCH_EXECUTION_ACCOUNT_SUMMARY_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_EXECUTION_ACCOUNT_SUMMARY_INITIAL_DELAY_MS:30000}
      flush-fixed-delay-ms: ${STOCK_BATCH_EXECUTION_ACCOUNT_SUMMARY_FLUSH_FIXED_DELAY_MS:30000}
      flush-batch-size: ${STOCK_BATCH_EXECUTION_ACCOUNT_SUMMARY_FLUSH_BATCH_SIZE:5000}
      max-pending-deltas: ${STOCK_BATCH_EXECUTION_ACCOUNT_SUMMARY_MAX_PENDING_DELTAS:100000}
    corporate-actions:
      enabled: ${STOCK_BATCH_CORPORATE_ACTIONS_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_CORPORATE_ACTIONS_INITIAL_DELAY_MS:20000}
      fixed-delay-ms: ${STOCK_BATCH_CORPORATE_ACTIONS_FIXED_DELAY_MS:60000}
    auto-market:
      enabled: ${STOCK_BATCH_AUTO_MARKET_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_INITIAL_DELAY_MS:5000}
      fixed-rate-ms: ${STOCK_BATCH_AUTO_MARKET_FIXED_RATE_MS:5000}
      daily-regime:
        enabled: ${STOCK_BATCH_AUTO_MARKET_DAILY_REGIME_ENABLED:true}
        initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_DAILY_REGIME_INITIAL_DELAY_MS:3000}
        fixed-delay-ms: ${STOCK_BATCH_AUTO_MARKET_DAILY_REGIME_FIXED_DELAY_MS:10000}
        pre-create-before-minutes: ${STOCK_BATCH_AUTO_MARKET_DAILY_REGIME_PRE_CREATE_BEFORE_MINUTES:30}
      generation-participant-chunk-size: ${STOCK_BATCH_AUTO_MARKET_GENERATION_PARTICIPANT_CHUNK_SIZE:25}
      generation-profile-worker-count: ${STOCK_BATCH_AUTO_MARKET_GENERATION_PROFILE_WORKER_COUNT:9}
      generation-base-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_BASE_INTERVAL_SECONDS:10}
      generation-min-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_MIN_INTERVAL_SECONDS:3}
      generation-max-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_MAX_INTERVAL_SECONDS:300}
      max-open-order-quantity-multiplier: ${STOCK_BATCH_AUTO_MARKET_MAX_OPEN_ORDER_QUANTITY_MULTIPLIER:10}
      generation-spread-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_SPREAD_SECONDS:10}
      generation-lease-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_LEASE_SECONDS:120}
      generation-due-limit-per-symbol: ${STOCK_BATCH_AUTO_MARKET_GENERATION_DUE_LIMIT_PER_SYMBOL:100}
      generation-candidate-row-limit: ${STOCK_BATCH_AUTO_MARKET_GENERATION_CANDIDATE_ROW_LIMIT:2000}
      deadlock-retry-max-attempts: ${STOCK_BATCH_AUTO_MARKET_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_AUTO_MARKET_DEADLOCK_RETRY_BACKOFF_MS:50}
      slow-symbol-log-threshold-ms: ${STOCK_BATCH_AUTO_MARKET_SLOW_SYMBOL_LOG_THRESHOLD_MS:1000}
      profile-lock:
        type: ${STOCK_BATCH_AUTO_MARKET_PROFILE_LOCK_TYPE:redis}
        key-prefix: ${STOCK_BATCH_AUTO_MARKET_PROFILE_LOCK_KEY_PREFIX:stock:auto-market:profile-lock:}
        ttl-seconds: ${STOCK_BATCH_AUTO_MARKET_PROFILE_LOCK_TTL_SECONDS:120}
      profile-queue:
        type: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_TYPE:redis}
        key: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_KEY:stock:auto-market:generation:ready-profile-zset}
        zone-id: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_ZONE_ID:Asia/Seoul}
        reconcile-enabled: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_RECONCILE_ENABLED:true}
        reconcile-initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_RECONCILE_INITIAL_DELAY_MS:4000}
        reconcile-fixed-delay-ms: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_RECONCILE_FIXED_DELAY_MS:600000}
        reconcile-limit: ${STOCK_BATCH_AUTO_MARKET_PROFILE_QUEUE_RECONCILE_LIMIT:100}
      symbol-selection:
        diversity-penalty: ${STOCK_BATCH_AUTO_MARKET_SYMBOL_SELECTION_DIVERSITY_PENALTY:3.0}
        participant-affinity-weight: ${STOCK_BATCH_AUTO_MARKET_SYMBOL_SELECTION_PARTICIPANT_AFFINITY_WEIGHT:0.75}
        max-share-per-profile: ${STOCK_BATCH_AUTO_MARKET_SYMBOL_SELECTION_MAX_SHARE_PER_PROFILE:0.55}
      thread-pool:
        core-size: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_CORE_SIZE:12}
        max-size: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_MAX_SIZE:12}
        queue-capacity: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_QUEUE_CAPACITY:0}
      run-dispatcher:
        thread-pool:
          core-size: ${STOCK_BATCH_AUTO_MARKET_RUN_THREAD_POOL_CORE_SIZE:1}
          max-size: ${STOCK_BATCH_AUTO_MARKET_RUN_THREAD_POOL_MAX_SIZE:1}
          queue-capacity: ${STOCK_BATCH_AUTO_MARKET_RUN_THREAD_POOL_QUEUE_CAPACITY:0}
    auto-market-order-expiry:
      enabled: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_INITIAL_DELAY_MS:7000}
      fixed-delay-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_FIXED_DELAY_MS:10000}
      expiry-chunk-limit: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_CHUNK_LIMIT:100}
      symbol-limit-per-run: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_SYMBOL_LIMIT_PER_RUN:100}
      deadlock-retry-max-attempts: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_DEADLOCK_RETRY_BACKOFF_MS:50}
    listing-auto-market:
      enabled: ${STOCK_BATCH_LISTING_AUTO_MARKET_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_INITIAL_DELAY_MS:8000}
      fixed-delay-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_FIXED_DELAY_MS:10000}
      symbol-limit-per-run: ${STOCK_BATCH_LISTING_AUTO_MARKET_SYMBOL_LIMIT_PER_RUN:100}
      deadlock-retry-max-attempts: ${STOCK_BATCH_LISTING_AUTO_MARKET_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_DEADLOCK_RETRY_BACKOFF_MS:50}
    auto-participant-cash-flow:
      enabled: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_INITIAL_DELAY_MS:5000}
      fixed-delay-ms: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_FIXED_DELAY_MS:300000}
      account-chunk-size: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_ACCOUNT_CHUNK_SIZE:200}
    corporate-action:
      account-chunk-size: ${STOCK_BATCH_CORPORATE_ACTION_ACCOUNT_CHUNK_SIZE:200}
      action-batch-limit: ${STOCK_BATCH_CORPORATE_ACTION_ACTION_BATCH_LIMIT:25}
    market-close:
      enabled: ${STOCK_BATCH_MARKET_CLOSE_ENABLED:true}
      poll-fixed-delay-ms: ${STOCK_BATCH_MARKET_CLOSE_POLL_FIXED_DELAY_MS:10000}
      order-capture-chunk-size: ${STOCK_BATCH_MARKET_CLOSE_ORDER_CAPTURE_CHUNK_SIZE:1000}
      order-cancel-chunk-size: ${STOCK_BATCH_MARKET_CLOSE_ORDER_CANCEL_CHUNK_SIZE:500}
      holding-snapshot-account-chunk-size: ${STOCK_BATCH_MARKET_CLOSE_HOLDING_SNAPSHOT_ACCOUNT_CHUNK_SIZE:500}
      account-snapshot-chunk-size: ${STOCK_BATCH_MARKET_CLOSE_ACCOUNT_SNAPSHOT_CHUNK_SIZE:500}
      reconciliation-account-chunk-size: ${STOCK_BATCH_MARKET_CLOSE_RECONCILIATION_ACCOUNT_CHUNK_SIZE:500}
      settlement-delay-simulation-minutes: ${STOCK_BATCH_MARKET_CLOSE_SETTLEMENT_DELAY_SIMULATION_MINUTES:10}
    post-close:
      lease-seconds: ${STOCK_BATCH_POST_CLOSE_LEASE_SECONDS:180}
      retry-base-seconds: ${STOCK_BATCH_POST_CLOSE_RETRY_BASE_SECONDS:30}
      retry-max-seconds: ${STOCK_BATCH_POST_CLOSE_RETRY_MAX_SECONDS:900}
      deferred-retry-seconds: ${STOCK_BATCH_POST_CLOSE_DEFERRED_RETRY_SECONDS:60}
      preopen-transform-time: ${STOCK_BATCH_POST_CLOSE_PREOPEN_TRANSFORM_TIME:04:30}
      auto-market-preparation-time: ${STOCK_BATCH_POST_CLOSE_AUTO_MARKET_PREPARATION_TIME:05:30}
      readiness-time: ${STOCK_BATCH_POST_CLOSE_READINESS_TIME:05:30}
      coordinator:
        enabled: ${STOCK_BATCH_POST_CLOSE_COORDINATOR_ENABLED:true}
        poll-fixed-delay-ms: ${STOCK_BATCH_POST_CLOSE_COORDINATOR_POLL_FIXED_DELAY_MS:10000}
      report-aggregation:
        enabled: ${STOCK_BATCH_POST_CLOSE_REPORT_AGGREGATION_ENABLED:true}
        symbol-chunk-size: ${STOCK_BATCH_POST_CLOSE_REPORT_AGGREGATION_SYMBOL_CHUNK_SIZE:25}
      readiness:
        enabled: ${STOCK_BATCH_POST_CLOSE_READINESS_ENABLED:true}
    settlement:
      enabled: ${STOCK_BATCH_SETTLEMENT_ENABLED:true}
      chunk-size: ${STOCK_BATCH_SETTLEMENT_CHUNK_SIZE:200}
    holding-cleanup:
      enabled: ${STOCK_BATCH_HOLDING_CLEANUP_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_HOLDING_CLEANUP_INITIAL_DELAY_MS:45000}
      fixed-delay-ms: ${STOCK_BATCH_HOLDING_CLEANUP_FIXED_DELAY_MS:300000}
      retention-simulation-days: ${STOCK_BATCH_HOLDING_CLEANUP_RETENTION_SIMULATION_DAYS:1}
      delete-limit: ${STOCK_BATCH_HOLDING_CLEANUP_DELETE_LIMIT:1000}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
