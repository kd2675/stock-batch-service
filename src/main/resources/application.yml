spring:
  application:
    name: stock-batch-service
  profiles:
    active: local-direct
    group:
      local: local
      local-direct:
        - local
      test: test
      dev: dev
      prod: prod
  devtools:
    livereload:
      enabled: false
    restart:
      enabled: false
  cloud:
    discovery:
      enabled: true
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000
            loggerLevel: basic
  data:
    redis:
      host: localhost
      port: 6379
  batch:
    job:
      enabled: false
  lifecycle:
    timeout-per-shutdown-phase: ${STOCK_BATCH_SHUTDOWN_TIMEOUT:130s}
  task:
    scheduling:
      shutdown:
        await-termination: ${STOCK_BATCH_SCHEDULING_AWAIT_TERMINATION:true}
        await-termination-period: ${STOCK_BATCH_SCHEDULING_AWAIT_TERMINATION_PERIOD:120s}

server:
  shutdown: ${STOCK_BATCH_SERVER_SHUTDOWN:graceful}

stock:
  simulation-clock:
    base-date: ${STOCK_SIMULATION_BASE_DATE:}
    real-seconds-per-day: ${STOCK_SIMULATION_REAL_SECONDS_PER_DAY:7200}
    stale-after-seconds: ${STOCK_SIMULATION_STALE_AFTER_SECONDS:30}
    heartbeat-fixed-delay-ms: ${STOCK_SIMULATION_HEARTBEAT_FIXED_DELAY_MS:5000}
  market-session:
    open-time: ${STOCK_MARKET_SESSION_OPEN_TIME:06:00}
    close-time: ${STOCK_MARKET_SESSION_CLOSE_TIME:18:00}
  batch:
    shutdown:
      await-running-jobs-seconds: ${STOCK_BATCH_SHUTDOWN_AWAIT_RUNNING_JOBS_SECONDS:120}
    internal:
      token: ${STOCK_BATCH_INTERNAL_TOKEN:}
      allow-empty-token: false
    job-lock:
      ttl-seconds: ${STOCK_BATCH_JOB_LOCK_TTL_SECONDS:180}
      heartbeat-interval-seconds: ${STOCK_BATCH_JOB_LOCK_HEARTBEAT_INTERVAL_SECONDS:30}
    scheduler-pools:
      shutdown-await-seconds: ${STOCK_BATCH_SCHEDULER_POOL_SHUTDOWN_AWAIT_SECONDS:120}
      execution:
        pool-size: ${STOCK_BATCH_EXECUTION_SCHEDULER_POOL_SIZE:2}
      auto-market:
        pool-size: ${STOCK_BATCH_AUTO_MARKET_SCHEDULER_POOL_SIZE:1}
      maintenance:
        pool-size: ${STOCK_BATCH_MAINTENANCE_SCHEDULER_POOL_SIZE:2}
      simulation-clock:
        pool-size: ${STOCK_BATCH_SIMULATION_CLOCK_SCHEDULER_POOL_SIZE:1}
    signal:
      initial-delay-ms: ${STOCK_BATCH_SIGNAL_INITIAL_DELAY_MS:3000}
      fixed-delay-ms: ${STOCK_BATCH_SIGNAL_FIXED_DELAY_MS:1000}
      chunk-limit: ${STOCK_BATCH_SIGNAL_CHUNK_LIMIT:20}
      processing-timeout-seconds: ${STOCK_BATCH_SIGNAL_PROCESSING_TIMEOUT_SECONDS:1800}
    jdbc:
      query-timeout-seconds: ${STOCK_BATCH_JDBC_QUERY_TIMEOUT_SECONDS:30}
    repository:
      schema:
        initialize: ${STOCK_BATCH_SCHEMA_INITIALIZE:false}
        location: classpath:db/schema/batch-metadata-mysql.sql
      datasource:
        url: jdbc:mysql://kimd0.iptime.org:23306/STOCK_BATCH_METADATA?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true
        username: root
        password: 1234
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: stock-batch-metadata-pool
          maximum-pool-size: 4
          minimum-idle: 1
          connection-timeout: 30000
          validation-timeout: 5000
          idle-timeout: 240000
          max-lifetime: 300000
          keepalive-time: 120000
    market-data:
      enabled: ${STOCK_BATCH_MARKET_DATA_ENABLED:true}
      provider: ${STOCK_BATCH_MARKET_DATA_PROVIDER:mock}
      price-cache-ttl-seconds: ${STOCK_PRICE_CACHE_TTL_SECONDS:60}
      kis:
        base-url: ${KIS_BASE_URL:https://openapi.koreainvestment.com:9443}
        app-key: ${KIS_APP_KEY:}
        app-secret: ${KIS_APP_SECRET:}
        market-div-code: ${KIS_MARKET_DIV_CODE:J}
        connect-timeout-ms: ${KIS_CONNECT_TIMEOUT_MS:5000}
        request-timeout-ms: ${KIS_REQUEST_TIMEOUT_MS:10000}
      initial-delay-ms: 30000
      fixed-delay-ms: 60000
    execution:
      scan-limit: ${STOCK_BATCH_EXECUTION_SCAN_LIMIT:300}
      buy-candidate-scan-limit: ${STOCK_BATCH_EXECUTION_BUY_CANDIDATE_SCAN_LIMIT:20}
      symbol-chunk-limit: ${STOCK_BATCH_EXECUTION_SYMBOL_CHUNK_LIMIT:50}
      deadlock-retry-max-attempts: ${STOCK_BATCH_EXECUTION_DEADLOCK_RETRY_MAX_ATTEMPTS:3}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_EXECUTION_DEADLOCK_RETRY_BACKOFF_MS:50}
      slow-symbol-log-threshold-ms: ${STOCK_BATCH_EXECUTION_SLOW_SYMBOL_LOG_THRESHOLD_MS:1000}
      thread-pool:
        core-size: ${STOCK_BATCH_EXECUTION_THREAD_POOL_CORE_SIZE:4}
        max-size: ${STOCK_BATCH_EXECUTION_THREAD_POOL_MAX_SIZE:4}
        queue-capacity: ${STOCK_BATCH_EXECUTION_THREAD_POOL_QUEUE_CAPACITY:100}
      symbol-lock:
        type: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_TYPE:redis}
        key-prefix: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_KEY_PREFIX:stock:orderbook:lock:}
        ttl-seconds: ${STOCK_BATCH_EXECUTION_SYMBOL_LOCK_TTL_SECONDS:120}
    virtual-price-execution:
      enabled: ${STOCK_BATCH_VIRTUAL_PRICE_EXECUTION_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_VIRTUAL_PRICE_EXECUTION_INITIAL_DELAY_MS:35000}
      fixed-delay-ms: ${STOCK_BATCH_VIRTUAL_PRICE_EXECUTION_FIXED_DELAY_MS:5000}
    order-book-execution:
      enabled: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_INITIAL_DELAY_MS:36000}
      fixed-delay-ms: ${STOCK_BATCH_ORDER_BOOK_EXECUTION_FIXED_DELAY_MS:1000}
    corporate-actions:
      enabled: ${STOCK_BATCH_CORPORATE_ACTIONS_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_CORPORATE_ACTIONS_INITIAL_DELAY_MS:20000}
      fixed-delay-ms: ${STOCK_BATCH_CORPORATE_ACTIONS_FIXED_DELAY_MS:60000}
    auto-market:
      enabled: ${STOCK_BATCH_AUTO_MARKET_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_INITIAL_DELAY_MS:5000}
      fixed-delay-ms: ${STOCK_BATCH_AUTO_MARKET_FIXED_DELAY_MS:10000}
      generation-participant-chunk-size: ${STOCK_BATCH_AUTO_MARKET_GENERATION_PARTICIPANT_CHUNK_SIZE:25}
      generation-base-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_BASE_INTERVAL_SECONDS:10}
      generation-min-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_MIN_INTERVAL_SECONDS:3}
      generation-max-interval-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_MAX_INTERVAL_SECONDS:300}
      generation-spread-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_SPREAD_SECONDS:10}
      generation-lease-seconds: ${STOCK_BATCH_AUTO_MARKET_GENERATION_LEASE_SECONDS:120}
      generation-due-limit-per-symbol: ${STOCK_BATCH_AUTO_MARKET_GENERATION_DUE_LIMIT_PER_SYMBOL:100}
      deadlock-retry-max-attempts: ${STOCK_BATCH_AUTO_MARKET_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_AUTO_MARKET_DEADLOCK_RETRY_BACKOFF_MS:50}
      slow-symbol-log-threshold-ms: ${STOCK_BATCH_AUTO_MARKET_SLOW_SYMBOL_LOG_THRESHOLD_MS:1000}
      thread-pool:
        core-size: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_CORE_SIZE:4}
        max-size: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_MAX_SIZE:8}
        queue-capacity: ${STOCK_BATCH_AUTO_MARKET_THREAD_POOL_QUEUE_CAPACITY:0}
    auto-market-order-expiry:
      enabled: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_INITIAL_DELAY_MS:7000}
      fixed-delay-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_FIXED_DELAY_MS:10000}
      expiry-chunk-limit: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_CHUNK_LIMIT:100}
      deadlock-retry-max-attempts: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_AUTO_MARKET_ORDER_EXPIRY_DEADLOCK_RETRY_BACKOFF_MS:50}
    listing-auto-market:
      enabled: ${STOCK_BATCH_LISTING_AUTO_MARKET_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_INITIAL_DELAY_MS:8000}
      fixed-delay-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_FIXED_DELAY_MS:10000}
      deadlock-retry-max-attempts: ${STOCK_BATCH_LISTING_AUTO_MARKET_DEADLOCK_RETRY_MAX_ATTEMPTS:5}
      deadlock-retry-backoff-ms: ${STOCK_BATCH_LISTING_AUTO_MARKET_DEADLOCK_RETRY_BACKOFF_MS:50}
    auto-participant-cash-flow:
      enabled: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_INITIAL_DELAY_MS:5000}
      fixed-delay-ms: ${STOCK_BATCH_AUTO_PARTICIPANT_CASH_FLOW_FIXED_DELAY_MS:60000}
    market-close:
      enabled: ${STOCK_BATCH_MARKET_CLOSE_ENABLED:true}
      poll-fixed-delay-ms: ${STOCK_BATCH_MARKET_CLOSE_POLL_FIXED_DELAY_MS:5000}
    settlement:
      enabled: ${STOCK_BATCH_SETTLEMENT_ENABLED:true}
    holding-cleanup:
      enabled: ${STOCK_BATCH_HOLDING_CLEANUP_ENABLED:true}
      initial-delay-ms: ${STOCK_BATCH_HOLDING_CLEANUP_INITIAL_DELAY_MS:45000}
      fixed-delay-ms: ${STOCK_BATCH_HOLDING_CLEANUP_FIXED_DELAY_MS:300000}
      retention-simulation-days: ${STOCK_BATCH_HOLDING_CLEANUP_RETENTION_SIMULATION_DAYS:1}
      delete-limit: ${STOCK_BATCH_HOLDING_CLEANUP_DELETE_LIMIT:1000}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
    registerWithEureka: true
    fetchRegistry: true
  instance:
    preferIpAddress: true
    hostname: localhost

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
