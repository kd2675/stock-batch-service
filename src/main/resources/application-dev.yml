server:
  port: 20481

spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:mysql://kimd0.iptime.org:23306/STOCK_SERVICE?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: stock-business-pool
      maximum-pool-size: 30
      minimum-idle: 1
      connection-timeout: 30000
      validation-timeout: 5000
      idle-timeout: 240000
      max-lifetime: 300000
      keepalive-time: 30000
  data:
    redis:
      host: kimd0.iptime.org
      port: 26379

stock:
  batch:
    internal:
      token: ${STOCK_BATCH_INTERNAL_TOKEN}
      allow-empty-token: false
    repository:
      datasource:
        url: jdbc:mysql://kimd0.iptime.org:23306/STOCK_BATCH_METADATA?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true
        username: root
        password: 1234
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
          pool-name: stock-batch-metadata-pool
          maximum-pool-size: 12
          minimum-idle: 1
          connection-timeout: 30000
          validation-timeout: 5000
          idle-timeout: 240000
          max-lifetime: 300000
          keepalive-time: 30000
