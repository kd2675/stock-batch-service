server:
  port: 10481

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: "${STOCK_DB_URL}?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true"
    username: ${STOCK_DB_USERNAME}
    password: ${STOCK_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ${STOCK_DB_POOL_NAME:stock-business-pool}
      maximum-pool-size: ${STOCK_DB_MAX_POOL_SIZE:8}
      minimum-idle: ${STOCK_DB_MINIMUM_IDLE:1}
      connection-timeout: ${STOCK_DB_CONNECTION_TIMEOUT:30000}
      validation-timeout: ${STOCK_DB_VALIDATION_TIMEOUT:5000}
      idle-timeout: ${STOCK_DB_IDLE_TIMEOUT:240000}
      max-lifetime: ${STOCK_DB_MAX_LIFETIME:300000}
      keepalive-time: ${STOCK_DB_KEEPALIVE_TIME:120000}
  data:
    redis:
      host: ${STOCK_REDIS_HOST}
      port: ${STOCK_REDIS_PORT}

stock:
  batch:
    internal:
      token: ${STOCK_BATCH_INTERNAL_TOKEN}
      allow-empty-token: false
    repository:
      datasource:
        url: "${STOCK_BATCH_DB_URL}?zeroDateTimeBehavior=convertToNull&useLegacyDatetimeCode=false&serverTimezone=Asia/Seoul&noAccessToProcedureBodies=true&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=30000&tcpKeepAlive=true"
        username: ${STOCK_BATCH_DB_USERNAME:${STOCK_DB_USERNAME}}
        password: ${STOCK_BATCH_DB_PASSWORD:${STOCK_DB_PASSWORD}}
        driver-class-name: ${STOCK_BATCH_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
        hikari:
          pool-name: ${STOCK_BATCH_DB_POOL_NAME:stock-batch-metadata-pool}
          maximum-pool-size: ${STOCK_BATCH_DB_MAX_POOL_SIZE:4}
          minimum-idle: ${STOCK_BATCH_DB_MINIMUM_IDLE:1}
          connection-timeout: ${STOCK_BATCH_DB_CONNECTION_TIMEOUT:30000}
          validation-timeout: ${STOCK_BATCH_DB_VALIDATION_TIMEOUT:5000}
          idle-timeout: ${STOCK_BATCH_DB_IDLE_TIMEOUT:240000}
          max-lifetime: ${STOCK_BATCH_DB_MAX_LIFETIME:300000}
          keepalive-time: ${STOCK_BATCH_DB_KEEPALIVE_TIME:120000}
