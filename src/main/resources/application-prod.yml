server:
  port: 10481

spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${STOCK_DB_URL}
    username: ${STOCK_DB_USERNAME}
    password: ${STOCK_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${STOCK_DB_MAX_POOL_SIZE:8}
      connection-timeout: ${STOCK_DB_CONNECTION_TIMEOUT:30000}
      max-lifetime: ${STOCK_DB_MAX_LIFETIME:540000}
      keepalive-time: ${STOCK_DB_KEEPALIVE_TIME:300000}
  data:
    redis:
      host: ${STOCK_REDIS_HOST}
      port: ${STOCK_REDIS_PORT}

stock:
  batch:
    repository:
      datasource:
        url: ${STOCK_BATCH_DB_URL}
        username: ${STOCK_BATCH_DB_USERNAME:${STOCK_DB_USERNAME}}
        password: ${STOCK_BATCH_DB_PASSWORD:${STOCK_DB_PASSWORD}}
        driver-class-name: ${STOCK_BATCH_DB_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
        hikari:
          maximum-pool-size: ${STOCK_BATCH_DB_MAX_POOL_SIZE:4}
          connection-timeout: ${STOCK_BATCH_DB_CONNECTION_TIMEOUT:30000}
          max-lifetime: ${STOCK_BATCH_DB_MAX_LIFETIME:540000}
          keepalive-time: ${STOCK_BATCH_DB_KEEPALIVE_TIME:300000}
